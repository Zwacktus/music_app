<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App</title>

    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-circle-play"></i>
            <span>Music</span>
        </div>

        <nav>

            <a href="#" class="active">
                <i class="fa-solid fa-house"></i>
                Startseite
            </a>

            <a href="#">
                <i class="fa-solid fa-compass"></i>
                Entdecken
            </a>

            <a href="#">
                <i class="fa-solid fa-book"></i>
                Mediathek
            </a>

            <a href="#">
                <i class="fa-solid fa-heart"></i>
                Favoriten
            </a>

        </nav>

        <button class="playlist-btn">
            <i class="fa-solid fa-plus"></i>
            Neue Playlist
        </button>

        <div class="playlist">

            <h3>Album</h3>

            <div class="album-card active-album">

                <img src="img/song.jpg">

                <div>

                    <h4>Songs</h4>

                    <p>1 Song</p>

                </div>

            </div>

        </div>

    </aside>

    <!-- Hauptbereich -->

    <main class="content">

        <header>

            <div class="search">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="search"
                    placeholder="Nach Songs suchen..."
                >

            </div>

        </header>

        <section>

            <h1>Deine Musik</h1>

            <div class="albums">

                <div class="music-card">

                    <div class="cover">

                        <img src="img/song.jpg">

                        <button class="play-btn" onclick="playSong()">

                            <i class="fa-solid fa-play"></i>

                        </button>

                    </div>

                    <h2>
                        Wahre Begebenheiten
                    </h2>

                    <p>
                        feat. AK Ausserkontrolle
                    </p>

                </div>

            </div>

        </section>

    </main>

</div>

<!-- Player -->

<div class="player">

    <div class="song-info">

        <img src="img/song.jpg">

        <div>

            <h3>
                Wahre Begebenheiten
            </h3>

            <span>
                AK Ausserkontrolle
            </span>

        </div>

    </div>

    <div class="controls">

        <button onclick="previousSong()">
            <i class="fa-solid fa-backward"></i>
        </button>

        <button class="big-play" onclick="playSong()">
            <i class="fa-solid fa-play"></i>
        </button>

        <button onclick="nextSong()">
            <i class="fa-solid fa-forward"></i>
        </button>

    </div>

    <div class="progress">

        <span id="currentTime">0:00</span>

        <input
            type="range"
            id="progress"
            value="0"
        >

        <span id="duration">0:00</span>

    </div>

    <div class="volume">

        <i class="fa-solid fa-volume-high"></i>

        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1"
        >

    </div>

</div>

<audio id="audio">

    <source src="songs/Wahre Begebenheiten (feat. AK Ausserkontrolle).mp3">

</audio>

<script src="script.js"></script>

</body>
</html>
